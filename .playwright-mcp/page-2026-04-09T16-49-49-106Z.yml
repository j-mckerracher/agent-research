                - strong [ref=e1558]:
                  - text: Provide meaningful
                  - code [ref=e1559]: "`reason`"
                - text: ": Describe purpose when adding resources to help system understand resource value"
              - listitem [ref=e1560]:
                - strong [ref=e1561]: Organize directory structure properly
                - text: ": Use"
                - code [ref=e1562]: "`target`"
                - text: parameter to group related resources together
              - listitem [ref=e1563]:
                - strong [ref=e1564]: Use session context
                - text: ":"
                - code [ref=e1565]: "`search()`"
                - text: leverages session history for intent analysis
              - listitem [ref=e1566]:
                - strong [ref=e1567]: Choose appropriate Embedding mode
                - text: ": Use"
                - code [ref=e1568]: "`multimodal`"
                - text: input for multimodal content
            - heading "How is the retrieval result score calculated?" [level=3] [ref=e1569]
            - paragraph [ref=e1570]: "OpenViking uses a score propagation mechanism:"
            - code [ref=e1572]:
              - generic [ref=e1573]: Final Score = 0.5 × Embedding Similarity + 0.5 × Parent Directory Score
            - paragraph [ref=e1574]: This design gives content under high-scoring directories a boost, reflecting the importance of "contextual environment".
            - heading "What is directory recursive retrieval?" [level=3] [ref=e1575]
            - paragraph [ref=e1576]: "Directory recursive retrieval is OpenViking's innovative retrieval strategy:"
            - list [ref=e1577]:
              - listitem [ref=e1578]:
                - strong [ref=e1579]: Intent Analysis
                - text: ": Analyze query to generate multiple retrieval conditions"
              - listitem [ref=e1580]:
                - strong [ref=e1581]: Initial Positioning
                - text: ": Vector retrieval to locate high-scoring directories"
              - listitem [ref=e1582]:
                - strong [ref=e1583]: Refined Exploration
                - text: ": Secondary retrieval within high-scoring directories"
              - listitem [ref=e1584]:
                - strong [ref=e1585]: Recursive Drill-down
                - text: ": Layer-by-layer recursion until convergence"
              - listitem [ref=e1586]:
                - strong [ref=e1587]: Result Aggregation
                - text: ": Return the most relevant context"
            - paragraph [ref=e1588]: This strategy finds semantically matching fragments while understanding the complete context of the information.
