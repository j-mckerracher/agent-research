              - generic [ref=e1494]: session = client.session()
              - generic [ref=e1495]: "# Add conversation messages"
              - generic [ref=e1496]: "await session.add_message(\"user\", [{\"type\": \"text\", \"text\": \"Help me analyze performance issues in this code\"}])"
              - generic [ref=e1497]: "await session.add_message(\"assistant\", [{\"type\": \"text\", \"text\": \"Let me analyze...\"}])"
              - generic [ref=e1498]: "# Mark used context (for tracking)"
              - generic [ref=e1499]: await session.used(["viking://resources/code/main.py"])
              - generic [ref=e1500]: "# Commit session to trigger memory extraction"
              - generic [ref=e1501]: await session.commit()
