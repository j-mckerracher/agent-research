            - paragraph [ref=e1272]: This design allows Agents to browse abstracts for quick positioning, then load details on demand, significantly saving token consumption.
            - heading "What is Viking URI? What's its purpose?" [level=3] [ref=e1273]
            - paragraph [ref=e1274]:
              - text: Viking URI is OpenViking's unified resource identifier, formatted as
              - code [ref=e1275]: "`viking://{scope}/{path}`"
              - text: ". It enables precise location of any context:"
            - code [ref=e1277]:
              - generic [ref=e1278]: viking://
              - generic [ref=e1279]: "├── resources/ # Knowledge base: documents, code, web pages, etc."
