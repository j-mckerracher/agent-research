            - heading "FAQ" [level=1] [ref=e1192]
            - heading "Basic Concepts" [level=2] [ref=e1193]
            - heading "What is OpenViking? What problems does it solve?" [level=3] [ref=e1194]
            - paragraph [ref=e1195]: "OpenViking is an open-source context database designed specifically for AI Agents. It solves core pain points when building AI Agents:"
            - list [ref=e1196]:
              - listitem [ref=e1197]:
                - strong [ref=e1198]: Fragmented Context
                - text: ": Memories, resources, and skills are scattered everywhere, difficult to manage uniformly"
              - listitem [ref=e1199]:
                - strong [ref=e1200]: Poor Retrieval Effectiveness
                - text: ": Traditional RAG's flat storage lacks global view, making it hard to understand complete context"
              - listitem [ref=e1201]:
                - strong [ref=e1202]: Unobservable Context
                - text: ": Implicit retrieval chains are like black boxes, difficult to debug when errors occur"
              - listitem [ref=e1203]:
                - strong [ref=e1204]: Limited Memory Iteration
                - text: ": Lacks Agent-related task memory and self-evolution capabilities"
            - paragraph [ref=e1205]: OpenViking unifies all context management through a filesystem paradigm, enabling tiered delivery and self-iteration.
            - heading "What's the fundamental difference between OpenViking and traditional vector databases?" [level=3] [ref=e1206]
