              - generic [ref=e1281]: "├── user/ # User context"
              - generic [ref=e1282]: "│ └── memories/ # User memories (preferences, entities, events)"
              - generic [ref=e1283]: "└── agent/ # Agent context"
              - generic [ref=e1284]: "├── skills/ # Callable skills"
              - generic [ref=e1285]: "└── memories/ # Agent memories (cases, patterns)"
