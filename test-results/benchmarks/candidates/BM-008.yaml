id: BM-008
name: 'Add note timestamp formatting'
difficulty_estimate: medium
description: |
  Add a configurable timestamp display format to the note component,
  supporting 'relative' (e.g., '2 hours ago') and 'absolute' (e.g., 'Apr 11, 2026 10:30 AM') modes.

story_prompt: |
  As a developer, I need the note component
  (libs/shared/ui/components/src/lib/notes/notes-container/note/)
  to support configurable timestamp display.
  Requirements:
  1. Add input `timestampFormat` of type 'relative' | 'absolute' with default 'absolute'
  2. In 'relative' mode, display time as relative (e.g., '2 hours ago', '3 days ago')
  3. In 'absolute' mode, display as formatted date string (e.g., 'Apr 11, 2026 10:30 AM')
  4. Add a helper function `formatRelativeTime(date: Date): string` in the component
  5. The timestamp should have data-test-id='note-timestamp'
  6. Handle edge case: future dates should show 'just now'
  7. Update Cypress tests and test harness

visible_acceptance_criteria:
  - id: AC-01
    description: 'timestampFormat input exists with correct type and default'
    weight: 1.0
  - id: AC-02
    description: 'Absolute format displays readable date string'
    weight: 1.0
  - id: AC-03
    description: 'Relative format shows human-readable relative time'
    weight: 1.5
  - id: AC-04
    description: 'Future dates handled gracefully'
    weight: 1.0
  - id: AC-05
    description: "data-test-id='note-timestamp' present"
    weight: 1.0
  - id: AC-06
    description: 'Cypress tests cover both formats'
    weight: 1.5
  - id: AC-07
    description: 'Test harness updated'
    weight: 1.0

hidden_checks:
  - type: grep_match
    file: 'libs/shared/ui/components/src/lib/notes/notes-container/note/note.component.ts'
    pattern: "timestampFormat\\|formatRelative"
  - type: grep_match
    file: 'libs/shared/ui/components/src/lib/notes/notes-container/note/note.component.test-harness.ts'
    pattern: 'timestamp'

required_artifacts:
  - 'libs/shared/ui/components/src/lib/notes/notes-container/note/note.component.ts'
  - 'libs/shared/ui/components/src/lib/notes/notes-container/note/note.component.test-harness.ts'

grading_metadata:
  expected_files_changed: 3-4
  expected_test_count_added: 3-5
  touches_existing_tests: true

notes: |
  Medium difficulty: requires date formatting logic, computed signals,
  edge case handling, and testing with mock dates.
